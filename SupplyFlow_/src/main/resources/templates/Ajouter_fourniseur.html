<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" th:href="@{/style.css}">
<body>
<div class="container">
<h2>Ajouter fourniseur</h2>

<form th:action="@{/save_fourniseur}" method="post" th:object="${fourniseur}">

    Name
    <input type="text" th:field="*{nom}"/>

    Ville
    <input type="text" th:field="*{ville}"/>

    Telephone
    <input type="number" th:field="*{telephone}"/>

    <button type="submit">Save</button>

</form>
</div>
</body>
</html>
